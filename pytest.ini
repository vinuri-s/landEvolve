# pytest.ini
[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Markers for categorizing tests
markers =
    sensitivity: Sensitivity analysis tests (long-running)
    kbr: K_br parameter sensitivity tests
    slow: Slow tests (may take several minutes)
    integration: Integration tests with UI

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    -ra
    
# Qt-specific settings
qt_api = pyqt6

# Timeout for tests (in seconds)
timeout = 900

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S