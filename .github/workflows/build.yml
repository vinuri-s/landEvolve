# Builds the LandEvolve desktop app with PyInstaller on Windows and macOS,
# uploads each build as a downloadable artifact, and — when you push a version
# tag like v1.0.0 — attaches the zipped builds to a GitHub Release.
name: Build application

on:
  # Manual "Run workflow" button in the Actions tab.
  workflow_dispatch:
  # Build + publish a Release whenever you push a tag like v1.0.0.
  push:
    tags: [ "v*" ]

permissions:
  contents: write   # needed to create/upload the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build_executable.py

      # Upload the runnable product. On Windows that is the onedir folder
      # (dist/LandEvolve); on macOS it is the .app bundle (dist/LandEvolve.app) —
      # the loose onedir folder has no Info.plist and segfaults Qt at startup.
      # GitHub zips the path into one downloadable artifact. `if: always()` so the
      # build still uploads even if a later step has a problem.
      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LandEvolve-${{ matrix.label }}
          path: ${{ matrix.label == 'macos' && 'dist/LandEvolve.app' || 'dist/LandEvolve' }}
          if-no-files-found: warn
          retention-days: 14

      # On a version tag (e.g. v1.0.0): zip the build and attach it to a Release.
      # Windows: shutil.make_archive zips the onedir folder (no symlinks, fine).
      - name: Zip for release (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.label == 'windows'
        run: python -c "import shutil; shutil.make_archive('LandEvolve-windows', 'zip', 'dist', 'LandEvolve')"

      # macOS: use `ditto`, not shutil/zip — a .app bundle contains symlinks
      # (Qt frameworks' Versions/Current, etc.) that Python's zipfile flattens,
      # corrupting the bundle. `ditto -c -k --keepParent` preserves them and the
      # bundle structure so the .app actually launches after download.
      - name: Zip for release (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.label == 'macos'
        run: ditto -c -k --keepParent dist/LandEvolve.app LandEvolve-macos.zip

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LandEvolve-${{ matrix.label }}.zip
