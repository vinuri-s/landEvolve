<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <script>
        window.CESIUM_BASE_URL = "https://cdnjs.cloudflare.com/ajax/libs/cesium/1.105.0/";
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.105.0/Cesium.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.105.0/Widgets/widgets.min.css" rel="stylesheet">
    <style>
        html,
        body,
        #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        #uiControls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(42, 42, 42, 0.8);
            padding: 10px;
            border-radius: 4px;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div id="cesiumContainer"></div>

    <script>
        // Check if Cesium is loaded
        if (typeof Cesium === 'undefined') {
            alert("CesiumJS library failed to load.");
        }

        // Initialize Viewer
        (async () => {
            try {
                // Determine base layer (OSM or Local)
                // Using OpenStreetMapImageryProvider is safest for global context
                const osmProvider = new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://tile.openstreetmap.org/'
                });

                // Create Viewer with modern 'baseLayer' option if supported, or fallback
                // version 1.105 should support baseLayer
                window.viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayer: new Cesium.ImageryLayer(osmProvider),
                    baseLayerPicker: false,
                    geocoder: false,
                    homeButton: false,
                    infoBox: false,
                    sceneModePicker: true,
                    selectionIndicator: false,
                    timeline: false,
                    navigationHelpButton: false,
                    animation: false,
                    shouldAnimate: true,
                    skyBox: false,
                    contextOptions: {
                        webgl: {
                            preserveDrawingBuffer: true
                        }
                    }
                });

                // Add basic attribution
                // window.viewer.scene.frameState.creditDisplay.addDefaultCredit is deprecated
                // Just let OSM handle its own credit or use addStaticCredit if supported, 
                // but simpler is better to avoid errors.
                const credit = new Cesium.Credit('<a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap Contributors</a>');
                window.viewer.creditDisplay.addStaticCredit(credit);

            } catch (e) {
                console.error("Critical Error initializing Cesium Viewer:", e);
                const msg = e.message || e;
                alert("Failed to initialize 3D Viewer: " + msg);
            }
        })();

        // Function to be called from Python
        function loadSimulationResult(imageUrl, bounds) {
            // bounds: { west, south, east, north }

            console.log("Loading Image:", imageUrl);
            console.log("Bounds:", bounds);

            try {
                if (!window.viewer) {
                    throw new Error("Cesium Viewer is not initialized.");
                }

                const entity = window.viewer.entities.add({
                    name: 'Simulation Result',
                    rectangle: {
                        coordinates: Cesium.Rectangle.fromDegrees(
                            bounds.west,
                            bounds.south,
                            bounds.east,
                            bounds.north
                        ),
                        material: new Cesium.ImageMaterialProperty({
                            image: imageUrl,
                            transparent: true
                        }),
                        classificationType: Cesium.ClassificationType.TERRAIN
                    }
                });

                window.viewer.zoomTo(entity).then(function (result) {
                    if (!result) {
                        console.error("Camera flight failed. Bounds might be too small or invalid.");
                    }
                }).catch(function (error) {
                    console.error("Zoom error:", error);
                });

            } catch (error) {
                console.error("Error adding entity:", error);
                alert("Error displaying 3D result: " + error);
            }
        }

        // Placeholder for testing
        // setTimeout(() => {
        //     loadSimulationResult("path/to/image.png", {west: -120, south: 35, east: -119, north: 36});
        // }, 2000);

    </script>
</body>

</html>
